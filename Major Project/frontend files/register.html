<!DOCTYPE html>
<html>
<head>

    <title>Register</title>

    <link rel="stylesheet" href="css/style.css">

    <form id="registerForm" onsubmit="registerUser(event)"></form>
</head>

<body>

    <div class="form-container">

        <h2>Register</h2>

        <input
            type="text"
            id="name"
            placeholder="Name">

        <input
            type="email"
            id="email"
            placeholder="Email">

        <input
            type="password"
            id="password"
            placeholder="Password">

        <select id="role">

            <option value="customer">

                Customer

            </option>

            <option value="vendor">

                Vendor

            </option>

        </select>

        <button onclick="registerUser()">

            Register

        </button>

    </div>

    <script src="js/script.js"></script>

</body>
</html>
